<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הצלחת שלי - המעקב התזונתי שלך</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body { font-family: 'Assistant', sans-serif; }
        h1, .meal-name { font-family: 'Outfit', 'Assistant', sans-serif; }
    </style>
</head>
<body>
    <div class="container">
        <header class="animate-up">
            <h1 dir="auto">הצלחת שלי</h1>
            <p class="subtitle" dir="auto">הדרך החכמה והיפה למעקב אחר התזונה שלך</p>
        </header>


        <!-- Stats Section -->
        <section class="stats-grid animate-up" style="animation-delay: 0.1s;">
            <div class="glass-card stat-item">
                <div class="stat-circle" id="stat-breakfast">0/1</div>
                <div class="stat-label">ארוחת בוקר</div>
            </div>
            <div class="glass-card stat-item">
                <div class="stat-circle" id="stat-lunch">0/1</div>
                <div class="stat-label">ארוחת צהריים</div>
            </div>
            <div class="glass-card stat-item">
                <div class="stat-circle" id="stat-dinner">0/1</div>
                <div class="stat-label">ארוחת ערב</div>
            </div>
            <div class="glass-card stat-item">
                <div class="stat-circle" id="stat-snacks">0</div>
                <div class="stat-label">נשנושים</div>
            </div>
            <div class="glass-card stat-item" style="background: var(--grad-primary); border: none;">
                <div class="stat-circle" style="background: rgba(255,255,255,0.2); border: none;" id="stat-total">0%</div>
                <div class="stat-label" style="color: white;">יעד יומי</div>
            </div>
        </section>

        <!-- Input Section -->
        <section class="glass-card animate-up" style="animation-delay: 0.2s;">
            <form class="meal-form" id="meal-form">
                <div class="input-group">
                    <label>שם המנה</label>
                    <input type="text" id="meal-name" placeholder="למשל: סלט קינואה..." required dir="auto">
                </div>
                <div class="input-group">
                    <label>קישור לתמונה</label>
                    <input type="url" id="meal-image" placeholder="https://..." dir="ltr">
                </div>
                <div class="input-group">
                    <label>קטגוריה / זמן</label>
                    <select id="meal-time">
                        <option value="repository">שמור למאגר בלבד</option>
                        <option value="morning">ארוחת בוקר</option>
                        <option value="afternoon">ארוחת צהריים</option>
                        <option value="evening">ארוחת ערב</option>
                        <option value="snacks">נשנושים</option>
                    </select>
                </div>
                <div class="input-group" style="flex-direction: row; align-items: center; gap: 0.5rem; grid-column: 1 / -1; justify-content: flex-start; margin-top: 0.5rem;">
                    <input type="checkbox" id="save-to-repo" style="width: auto; height: auto; cursor: pointer;">
                    <label for="save-to-repo" style="cursor: pointer; padding: 0;">שמור גם למאגר המנות הקבוע</label>
                </div>
                <button type="submit" class="btn-add">
                    <span>הוסף מנה</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </form>
        </section>

        <!-- Repository Section -->
        <section class="repository-section animate-up" style="animation-delay: 0.3s;">
            <h2 class="section-title">מאגר המנות שלי</h2>
            <div class="repository-grid" id="repository-list">
                <!-- Repository items will be injected here -->
            </div>
        </section>

        <!-- Meal List -->
        <div class="meal-list" id="meal-list">
            <!-- Daily meals will be injected here -->
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
